name: Update Publications

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch publications
        run: python scripts/fetch_publications.py --config config/site-config.js

      - name: Commit updated publications
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/publications.json assets/data/publications.js
          if git diff --cached --quiet; then
            echo "No changes to publications data"
          else
            git commit -m "chore: update publications data [skip ci]"
            git push
          fi
